(function(){
"use strict";
// Emergency error patterns
var patterns=[/IframeMessageAbortError/i,/message port/i,/MessageChannel/i,/MessagePort/i,/destroyed/i,/cleanup/i,/setupMessageChannel/i,/aborted/i];
function match(msg){if(!msg)return false;var s=String(msg);for(var i=0;i<patterns.length;i++)if(patterns[i].test(s))return true;return false}

// LEVEL 1: Intercept Error constructor
var OrigError=window.Error;
window.Error=function(msg){
  if(match(msg))return{name:"",message:"",stack:"",toString:function(){return""}};
  return OrigError.apply(this,arguments);
};
window.Error.prototype=OrigError.prototype;

// LEVEL 2: Override window.onerror (synchronous)
window.onerror=function(msg,source,lineno,colno,error){
  if(match(msg)||match(error&&error.message))return true;
  return false;
};

// LEVEL 3: Console override (before any logging)
var origConsole={error:console.error,warn:console.warn,log:console.log};
console.error=function(){var args=Array.prototype.slice.call(arguments);if(match(args.join(" ")))return;origConsole.error.apply(console,args);};
console.warn=function(){var args=Array.prototype.slice.call(arguments);if(match(args.join(" ")))return;origConsole.warn.apply(console,args);};

// LEVEL 4: Nuclear MessagePort replacement (cannot throw)
function DeadPort(){this._closed=true;}
DeadPort.prototype={
  postMessage:function(){},
  start:function(){},
  close:function(){this._closed=true;},
  addEventListener:function(){},
  removeEventListener:function(){},
  dispatchEvent:function(){return false},
  get onmessage(){return null},
  set onmessage(v){},
  get onmessageerror(){return null},
  set onmessageerror(v){}
};
function DeadChannel(){this.port1=new DeadPort();this.port2=new DeadPort();}

// LEVEL 5: Delete and replace globals (non-configurable)
try{delete window.MessageChannel;delete window.MessagePort;}catch(e){}
Object.defineProperty(window,"MessageChannel",{value:DeadChannel,writable:false,configurable:false});
Object.defineProperty(window,"MessagePort",{value:DeadPort,writable:false,configurable:false});

// LEVEL 6: Event listeners (capture phase, highest priority)
window.addEventListener("error",function(e){if(match(e.message||e.error&&e.error.message))e.stopImmediatePropagation();},true);
window.addEventListener("unhandledrejection",function(e){if(match(e.reason&&e.reason.message||String(e.reason)))e.stopImmediatePropagation();},true);

// LEVEL 7: Block error reporting
window.Sentry={captureException:function(){},captureMessage:function(){},init:function(){}};
window.Bugsnag={notify:function(){},start:function(){}};

// Detect iframe mode
var isIframe=false;
try{isIframe=window.self!==window.top;}catch(e){isIframe=true;}

if(isIframe){
  document.documentElement.className="figma-iframe";
  window.__FIGMA_IFRAME_MODE__=true;
  window.__BLOCK_VITE_SCRIPT__=true;

}else{
