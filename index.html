<!DOCTYPE html>
<html lang="af">
  <head>
    <meta charset="UTF-8" />
    
    <!-- v11.21 NUCLEAR FIX: Block MessageChannel at the ABSOLUTE FIRST MOMENT -->
    <script>
      // Execute SYNCHRONOUSLY - before anything else can run
      (function() {
        'use strict';
        
        // Delete MessageChannel IMMEDIATELY
        delete window.MessageChannel;
        delete window.MessagePort;
        
        // Define as non-configurable null to prevent recreation
        Object.defineProperty(window, 'MessageChannel', {
          configurable: false,
          enumerable: true,
          writable: false,
          value: null
        });
        
        Object.defineProperty(window, 'MessagePort', {
          configurable: false,
          enumerable: true,
          writable: false,
          value: null
        });
        
        console.log('[v11.21] MessageChannel NUKED - non-configurable null');
      })();
    </script>
    
    <!-- v11.21: Iframe detection + React disabling -->
    <script>
      (function() {
        'use strict';
        var isIframe = false;
        try {
          isIframe = window.self !== window.top;
        } catch (e) {
          isIframe = true;
        }
        
        if (isIframe) {
          document.documentElement.className = 'figma-iframe';
          window.__FIGMA_IFRAME_MODE__ = true;
          window.__BLOCK_VITE_SCRIPT__ = true;
          window.__REACT_DISABLED__ = true;
          window.__NO_REACT__ = true;
          window.React = null;
          window.ReactDOM = null;
          window.__vitePreload = function() { return Promise.resolve(); };
          console.log('[v11.21] IFRAME MODE - React disabled');
        } else {
          document.documentElement.className = '';
          window.__FIGMA_IFRAME_MODE__ = false;
          window.__BLOCK_VITE_SCRIPT__ = false;
          window.__REACT_DISABLED__ = false;
          window.__NO_REACT__ = false;
          console.log('[v11.21] Browser mode - React enabled');
        }
      })();
    </script>
    
    <link rel="icon" type="image/svg+xml" href="/newspaper.svg" />

    <!-- Inline CSS for instant show/hide -->
    <style>
      /* Default state */
      #figma-preview {
        display: none;
      }
      
      #root {
        display: block;
      }
      
      /* Iframe state - applied via class */
      html.figma-iframe #figma-preview {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #142135 0%, #1a2943 100%);
        font-family: system-ui, -apple-system, sans-serif;
        color: white;
        text-align: center;
        padding: 2rem;
      }
      
      html.figma-iframe #root {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- React root -->
    <div id="root"></div>
    
    <!-- Static preview for Figma iframe -->
    <div id="figma-preview">

          Figma Make Preview Mode
        </p>
        <p style="margin: 0 0 1rem 0; font-size: 0.875rem; color: #cbd5e1;">

        </p>
        <p style="margin: 0; font-size: 0.875rem; color: #64748b;">
          Deploy to production or use a development server to view the full application.
        </p>
      </div>
    </div>
    
    <!-- Conditional script loading with maximum protection -->
    <script>
      (function() {
        'use strict';
        
        // Check ALL possible flags
        if (window.__BLOCK_VITE_SCRIPT__ === true ||
            window.__FIGMA_IFRAME_MODE__ === true ||
            window.__REACT_DISABLED__ === true ||
            window.__NO_REACT__ === true) {
          console.log('[v11.21] Script injection BLOCKED - iframe mode');
          return; // Stop completely
        }
        
        // Triple-check with direct detection
        var isIframe = false;
        try {
          isIframe = window.self !== window.top;
        } catch (e) {
          isIframe = true;
        }
        
        if (isIframe) {
          console.log('[v11.21] Script injection BLOCKED - direct iframe detection');
          return; // Stop completely
        }
        
        // Safe to load React
        console.log('[v11.21] Loading Vite module...');
        var script = document.createElement('script');
        script.type = 'module';
        script.src = '/src/main.tsx';
        script.onerror = function(e) {
          console.error('[v11.21] Failed to load Vite module:', e);
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>
